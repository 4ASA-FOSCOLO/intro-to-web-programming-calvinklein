<!DOCTYPE html>
<html>
<head>
    <title>Pizza Margherita</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .stars {
            font-size: 40px;
            cursor: pointer;
        }

        .star {
            color: gray;
            transition: 0.2s;
        }

        .star.active {
            color: gold;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section>
    <h1>🍕 Pizza Margherita</h1>

    <img src="https://assets.tmecosys.com/image/upload/t_web_rdp_recipe_584x480_1_5x/img/recipe/ras/Assets/48a49653c8716457eb0b2f7eb3c7d74c/Derivates/8d83d9ed4567fa15456d8eec7557e60006a15576.jpg" width="400">

    <h2>Preparazione</h2>
    <p>
    1. Stendi l'impasto.<br>
    2. Aggiungi il pomodoro.<br>
    3. Metti la mozzarella.<br>
    4. Cuoci a 220°C per 15 minuti.<br>
    5. Aggiungi il basilico.
    </p>

    <h2>⭐ Dai un voto</h2>

    <div class="stars">
        <span class="star" onclick="rate(1)">★</span>
        <span class="star" onclick="rate(2)">★</span>
        <span class="star" onclick="rate(3)">★</span>
        <span class="star" onclick="rate(4)">★</span>
        <span class="star" onclick="rate(5)">★</span>
    </div>

    <p id="voteText"></p>

    <br>
    <a href="index.html">⬅ Torna alla home</a>
</section>

<script>
    let stars = document.querySelectorAll('.star');

    function rate(n) {
        localStorage.setItem("pizzaRating", n);
        updateStars(n);
    }

    function updateStars(rating) {
        stars.forEach((star, index) => {
            if(index < rating){
                star.classList.add("active");
            } else {
                star.classList.remove("active");
            }
        });

        document.getElementById("voteText").innerText =
            "Hai dato " + rating + " stelle!";
    }

    // Carica voto salvato
    let saved = localStorage.getItem("pizzaRating");
    if(saved){
        updateStars(saved);
    }
</script>

</body>
</html>
